# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# For local development: uses H2 (in-memory)
# For production: uses PostgreSQL from DATABASE_URL (Render)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:shreesamarth}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# For PostgreSQL (production)
spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Console (only for local dev)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=file:./uploads/

# JWT Configuration
jwt.secret=${JWT_SECRET:ShreeSamarthEnterpriseFleetManagementSystemSecretKey2024VeryLongSecureKey}
jwt.expiration=86400000

# SendGrid Email Configuration (replace with your API key in production)
sendgrid.api.key=${SENDGRID_API_KEY:YOUR_SENDGRID_API_KEY_HERE}
sendgrid.from.email=${SENDGRID_EMAIL:shreesamarthenterprises@gmail.com}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.shreesamarth=DEBUG

# OCR Service Configuration
ocr.service.url=${OCR_SERVICE_URL:http://localhost:5001}
