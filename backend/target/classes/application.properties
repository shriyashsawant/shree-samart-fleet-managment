# Server Configuration
server.port=${PORT:8080}

# Database Configuration - Using Supabase Connection Pooler (port 6543)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP settings - optimized for connection pooler
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration - ddl-auto=none to avoid schema inspection issues with pooler
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optimization for Supabase Connection Pooler (PgBouncer in Transaction Mode)
# prepareThreshold=0 disables prepared statements which cause "prepared statement already exists" errors
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.sslmode=require

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=file:./uploads/

# JWT Configuration
jwt.secret=${JWT_SECRET:ShreeSamarthEnterpriseFleetManagementSystemSecretKey2024VeryLongSecureKey}
jwt.expiration=86400000

# SendGrid Email Configuration (replace with your API key in production)
sendgrid.api.key=${SENDGRID_API_KEY:YOUR_SENDGRID_API_KEY_HERE}
sendgrid.from.email=${SENDGRID_EMAIL:shreesamarthenterprises@gmail.com}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.shreesamarth=DEBUG

# OCR Service Configuration
ocr.service.url=${OCR_SERVICE_URL:http://localhost:5001}
