# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# Use DATABASE_URL from Render/Supabase, fallback to H2 for local
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/shreesamarth}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=file:./uploads/

# JWT Configuration
jwt.secret=${JWT_SECRET:ShreeSamarthEnterpriseFleetManagementSystemSecretKey2024VeryLongSecureKey}
jwt.expiration=86400000

# SendGrid Email Configuration (replace with your API key in production)
sendgrid.api.key=${SENDGRID_API_KEY:YOUR_SENDGRID_API_KEY_HERE}
sendgrid.from.email=${SENDGRID_EMAIL:shreesamarthenterprises@gmail.com}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.shreesamarth=DEBUG

# OCR Service Configuration
ocr.service.url=${OCR_SERVICE_URL:http://localhost:5001}
