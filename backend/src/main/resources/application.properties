# Server Configuration
server.port=${PORT:8080}

# === DATABASE CONFIGURATION ===
# Production (Render): DATABASE_URL is set as the full JDBC PostgreSQL URL
# Local dev: Falls back to H2 in-memory database
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:shreesamarth;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}

# Driver is auto-detected from the JDBC URL by Spring Boot:
#   jdbc:h2:*          -> org.h2.Driver  (local)
#   jdbc:postgresql:*  -> org.postgresql.Driver (Render)
# DO NOT override spring.datasource.driver-class-name here.

# HikariCP settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# CRITICAL for Supabase PgBouncer in Transaction Mode:
# Disables server-side prepared statements to prevent "already exists" errors
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA/Hibernate
# ddl-auto=none: Do NOT let Hibernate alter the schema on Render (tables already exist in Supabase)
# Hibernate's schema migration is not compatible with PgBouncer in transaction mode
# Locally with H2 this would fail, but H2 is only for local dev with the profile below
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 Console for local debugging (harmless in production, just unreachable)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=file:./uploads/

# JWT Configuration
jwt.secret=${JWT_SECRET:ShreeSamarthEnterpriseFleetManagementSystemSecretKey2024VeryLongSecureKey}
jwt.expiration=86400000

# SendGrid Email Configuration
sendgrid.api.key=${SENDGRID_API_KEY:YOUR_SENDGRID_API_KEY_HERE}
sendgrid.from.email=${SENDGRID_EMAIL:shreesamarthenterprises@gmail.com}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.shreesamarth=DEBUG

# OCR Service Configuration
ocr.service.url=${OCR_SERVICE_URL:https://shreesamarth-ocr.onrender.com}
