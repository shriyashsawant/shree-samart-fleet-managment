# Server Configuration
server.port=${PORT:8080}

# === DATABASE CONFIGURATION ===
# If DATABASE_URL is set (Render/Production) -> use PostgreSQL/Supabase
# If not set (local dev) -> use H2 in-memory for testing
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:shreesamarth;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# HikariCP settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate - use 'update' so tables are created if missing (safe for both H2 and Postgres)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Let Hibernate auto-detect dialect — works for both H2 and PostgreSQL
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 Console (for local debugging only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=file:./uploads/

# JWT Configuration
jwt.secret=${JWT_SECRET:ShreeSamarthEnterpriseFleetManagementSystemSecretKey2024VeryLongSecureKey}
jwt.expiration=86400000

# SendGrid Email Configuration
sendgrid.api.key=${SENDGRID_API_KEY:YOUR_SENDGRID_API_KEY_HERE}
sendgrid.from.email=${SENDGRID_EMAIL:shreesamarthenterprises@gmail.com}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.shreesamarth=DEBUG

# OCR Service Configuration
ocr.service.url=${OCR_SERVICE_URL:https://shreesamarth-ocr.onrender.com}

