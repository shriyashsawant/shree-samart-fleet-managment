# Server Configuration
server.port=${PORT:8080}

# === DATABASE CONFIGURATION ===
# Render sets DATABASE_URL as a full JDBC PostgreSQL URL
# Locally falls back to H2 in-memory for testing
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:shreesamarth;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}

# IMPORTANT: Do NOT specify driver-class-name.
# Spring Boot auto-detects the correct driver from the JDBC URL:
#   jdbc:postgresql:// -> org.postgresql.Driver  (Render/Supabase)
#   jdbc:h2:           -> org.h2.Driver          (local dev)

# HikariCP settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# CRITICAL for Supabase PgBouncer in Transaction Mode:
# Disables server-side prepared statements to prevent "prepared statement already exists" errors
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA/Hibernate
# ddl-auto=update: Creates tables that don't exist yet WITHOUT dropping any data.
# This is required because the Supabase schema may not have all tables on first deploy.
# It is safe to use with PgBouncer since prepareThreshold=0 is set.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# No dialect specified - Hibernate auto-detects from JDBC URL (works for H2 and PostgreSQL)

# H2 Console for local debugging at http://localhost:8080/h2-console (harmless in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=file:./uploads/

# JWT Configuration
jwt.secret=${JWT_SECRET:ShreeSamarthEnterpriseFleetManagementSystemSecretKey2024VeryLongSecureKey}
jwt.expiration=86400000

# SendGrid Email Configuration
sendgrid.api.key=${SENDGRID_API_KEY:YOUR_SENDGRID_API_KEY_HERE}
sendgrid.from.email=${SENDGRID_EMAIL:shreesamarthenterprises@gmail.com}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.shreesamarth=DEBUG

# OCR Service Configuration
ocr.service.url=${OCR_SERVICE_URL:https://shreesamarth-ocr.onrender.com}
