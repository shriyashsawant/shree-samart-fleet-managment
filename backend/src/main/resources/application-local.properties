# ============================================================
# LOCAL DEVELOPMENT OVERRIDES
# Use this profile locally: mvn spring-boot:run -Dspring-boot.run.profiles=local
# ============================================================

# Override with H2 in-memory database for local testing
spring.datasource.url=jdbc:h2:mem:shreesamarth;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=

# Create tables automatically in H2 (needed since H2 starts empty)
spring.jpa.hibernate.ddl-auto=create-drop

# H2 doesn't need PgBouncer settings - disable
spring.datasource.hikari.data-source-properties.prepareThreshold=

# Use H2 dialect locally (auto-detected, no need to specify)
spring.jpa.properties.hibernate.dialect=

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
